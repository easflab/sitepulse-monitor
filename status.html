<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4U - Service Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .status-bar { height: 6px; background: linear-gradient(90deg, #22c55e, #86efac); border-radius: 9999px; }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen">
    <div class="max-w-5xl mx-auto p-4 sm:p-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <h1 class="text-4xl font-bold">D4U</h1>
            <div class="text-right text-sm">
                <p class="text-gray-400">Service status</p>
                <p class="text-xs text-gray-500">Atualizado: <span id="lastUpdate">agora</span></p>
            </div>
        </header>

        <div class="bg-emerald-500/10 border border-emerald-500/30 rounded-3xl p-6 mb-10">
            <div class="flex items-center gap-4">
                <div class="w-5 h-5 bg-emerald-500 rounded-full animate-pulse"></div>
                <h2 class="text-2xl font-semibold text-emerald-400">All systems Operational</h2>
            </div>
        </div>

        <div class="bg-white/5 backdrop-blur-md rounded-3xl p-6">
            <h3 class="text-xl font-semibold mb-6">Monitores</h3>
            <div id="servicesList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

        <script>
        let sites = JSON.parse(localStorage.getItem('sitepulse_sites')) || [];
        let updateInterval = null;

        function updateStatusPage() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';

            if (sites.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-400">
                        Nenhum site monitorado ainda.<br>
                        <a href="index.html" class="text-purple-400 hover:underline">Vá para a página principal e adicione sites</a>
                    </div>`;
                return;
            }

            sites.forEach(site => {
                const uptime = site.history && site.history.length > 0 
                    ? Math.round((site.history.filter(h => h.online).length / site.history.length) * 100) : 99;
                const isUp = site.status === 'up' || site.status === 'unknown';

                const item = document.createElement('div');
                item.className = "flex flex-col md:flex-row md:items-center justify-between bg-white/5 hover:bg-white/10 p-5 rounded-2xl transition-all border border-white/10";
                item.innerHTML = `
                    <div class="flex-1 mb-4 md:mb-0">
                        <p class="font-medium text-base break-all">${site.url}</p>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <p class="text-emerald-400 font-mono text-xl font-semibold">${uptime}%</p>
                            <div class="w-40 h-1.5 bg-gray-700 rounded-full overflow-hidden mt-1">
                                <div class="status-bar" style="width: ${uptime}%"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 min-w-[90px]">
                            <div class="w-3.5 h-3.5 rounded-full ${isUp ? 'bg-emerald-500 ring-2 ring-emerald-500/30 animate-pulse' : 'bg-red-500'}"></div>
                            <span class="font-medium ${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? 'Operational' : 'Down'}</span>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });

            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('pt-BR');
        }

        window.onload = () => {
            updateStatusPage();
            updateInterval = setInterval(updateStatusPage, 10000);
        };
    </script>>
</body>
</html>
