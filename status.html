<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .status-bar { height: 8px; background: linear-gradient(90deg, #22c55e, #86efac); }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen">
    <div class="max-w-5xl mx-auto p-4 md:p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <h1 class="text-4xl font-bold">STATUS</h1>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-400">Service status</p>
                <p class="text-xs text-gray-500">Última atualização: <span id="lastUpdate">agora</span></p>
            </div>
        </div>

        <!-- Status Geral -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 mb-8 border border-green-500/30">
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 bg-green-500 rounded-full animate-pulse"></div>
                <h2 class="text-2xl font-semibold text-green-400">All systems Operational</h2>
            </div>
        </div>

        <!-- Lista de Serviços -->
        <div class="bg-white/5 backdrop-blur-md rounded-2xl p-6">
            <h3 class="text-lg font-medium mb-6 text-gray-300">Services</h3>
            
            <div id="servicesList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Os sites serão inseridos aqui via JS -->
            </div>
        </div>

        <div class="text-center text-xs text-gray-500 mt-10">
            <p>Powered by SitePulse • <span id="currentTime"></span></p>
        </div>
    </div>

    <script>
        let sites = JSON.parse(localStorage.getItem('sitepulse_sites')) || [];

        function updateStatusPage() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';

            sites.forEach(site => {
                const uptime = site.history && site.history.length > 0 
                    ? Math.round((site.history.filter(h => h.online).length / site.history.length) * 100) 
                    : 100;

                const isUp = site.status === 'up';

                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-white/5 hover:bg-white/10 transition p-5 rounded-xl border border-white/10";
                div.innerHTML = `
                    <div class="flex-1">
                        <p class="font-medium">${site.url}</p>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="text-right">
                            <p class="text-green-400 font-mono text-lg">${uptime}%</p>
                            <div class="w-48 h-2 bg-gray-700 rounded overflow-hidden">
                                <div class="h-full bg-green-500" style="width: ${uptime}%"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 w-20">
                            <div class="w-3 h-3 rounded-full ${isUp ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></div>
                            <span class="${isUp ? 'text-green-400' : 'text-red-400'} font-medium">
                                ${isUp ? 'Up' : 'Down'}
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            // Atualiza horário
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('pt-BR');
            document.getElementById('currentTime').textContent = new Date().toLocaleString('pt-BR');
        }

        // Atualiza a cada 10 segundos
        setInterval(updateStatusPage, 10000);
        
        // Primeira carga
        window.onload = updateStatusPage;
    </script>
</body>
</html>
