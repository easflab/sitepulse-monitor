<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseMonitor - Service Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .status-bar { height: 8px; background: linear-gradient(90deg, #22c55e, #86efac); border-radius: 9999px; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen transition-colors">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-10">
            <div class="flex items-center gap-4">
                <i class="fas fa-heartbeat text-emerald-500 text-5xl"></i>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">PulseMonitor</h1>
                    <p class="text-emerald-400/80 text-sm">Service Status</p>
                </div>
            </div>
            <button onclick="toggleTheme()" class="p-4 bg-gray-800 hover:bg-gray-700 rounded-2xl transition">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </header>

        <!-- Global Status -->
        <div class="bg-gradient-to-r from-emerald-500/10 to-transparent border border-emerald-500/30 rounded-3xl p-8 mb-12">
            <div class="flex items-center gap-5">
                <div class="w-6 h-6 bg-emerald-500 rounded-full animate-pulse"></div>
                <div>
                    <h2 class="text-3xl font-semibold text-emerald-400">All systems Operational</h2>
                    <p class="text-emerald-500/70">Todos os serviços estão funcionando normalmente</p>
                </div>
            </div>
        </div>

        <div id="servicesList" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
    </div>

    <script>
        let sites = JSON.parse(localStorage.getItem('sitepulse_sites')) || [];
        let charts = {};

        function toggleTheme() {
            document.documentElement.classList.toggle('light-mode');
            const isLight = document.documentElement.classList.contains('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-moon', !isLight);
            icon.classList.toggle('fa-sun', isLight);
            localStorage.setItem('statusTheme', isLight ? 'light' : 'dark');
        }

        function createHistoryChart(canvasId, history) {
            if (charts[canvasId]) charts[canvasId].destroy();
            
            const ctx = document.getElementById(canvasId).getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map((_, i) => `#${i+1}`),
                    datasets: [{
                        label: 'Tempo de Resposta',
                        data: history.map(h => h.responseTime),
                        borderColor: '#22c55e',
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#374151' } },
                        x: { grid: { color: '#374151' } }
                    }
                }
            });
            charts[canvasId] = chart;
        }

        function updateStatusPage() {
            const container = document.getElementById('servicesList');
            container.innerHTML = '';

            if (sites.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">Nenhum site monitorado.</div>`;
                return;
            }

            sites.forEach((site, index) => {
                const uptime = site.history && site.history.length > 0 
                    ? Math.round((site.history.filter(h => h.online).length / site.history.length) * 100) : 99;
                const isUp = site.status === 'up' || site.status === 'unknown';

                const item = document.createElement('div');
                item.className = "bg-white/5 hover:bg-white/10 p-8 rounded-3xl transition-all card-hover border border-white/10";
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <p class="font-semibold text-xl break-all">${site.url}</p>
                            <p class="text-sm text-gray-400 mt-1">${new Date(site.lastCheck).toLocaleString('pt-BR')}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-5xl font-bold text-emerald-400">${uptime}<span class="text-2xl">%</span></p>
                            <p class="text-xs text-gray-400">UPTIME</p>
                        </div>
                    </div>
                    
                    <div class="h-48 mb-8">
                        <canvas id="chart-${index}"></canvas>
                    </div>
                    
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full ${isUp ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}"></div>
                            <span class="font-medium ${isUp ? 'text-emerald-400' : 'text-red-400'}">${isUp ? 'Operational' : 'Down'}</span>
                        </div>
                        <div class="text-sm text-gray-400">
                            Última resposta: <span class="font-mono">${site.responseTime || '?'}ms</span>
                        </div>
                    </div>
                `;
                container.appendChild(item);

                if (site.history && site.history.length > 0) {
                    setTimeout(() => createHistoryChart(`chart-${index}`, site.history), 100);
                }
            });
        }

        window.onload = () => {
            if (localStorage.getItem('statusTheme') === 'light') {
                document.documentElement.classList.add('light-mode');
                document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
            }
            updateStatusPage();
            setInterval(updateStatusPage, 15000);
        };
    </script>
</body>
</html>
