<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SitePulse - Monitor de Sites</title>
    
    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 sm:p-6"></div>
        <<header class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-8 lg:mb-10">
    <div class="flex items-center gap-4">
        <i class="fas fa-pulse text-emerald-500 text-3xl lg:text-4xl"></i>
        <div>
            <h1 class="text-2xl lg:text-4xl font-bold">SitePulse</h1>
            <p class="text-gray-400 text-sm lg:text-base">Monitoramento Profissional</p>
        </div>
    </div>
    
    <div class="flex flex-wrap gap-2 sm:gap-3">
        <a href="status.html" target="_blank" class="flex-1 sm:flex-none text-center sm:text-left items-center gap-2 bg-purple-600 hover:bg-purple-700 px-4 sm:px-5 py-3 rounded-xl transition text-sm font-medium">
            <i class="fas fa-chart-bar"></i> Status Page
        </a>
        <!-- outros botões -->
    </div>
</header>

        <div class="bg-gray-900 rounded-3xl p-6 md:p-8 mb-10">
            <div class="flex gap-4">
                <input type="text" id="urlInput" 
                       class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-emerald-500"
                       placeholder="https://exemplo.com">
                <button onclick="addSite()" 
                        class="bg-emerald-600 hover:bg-emerald-700 px-8 md:px-10 rounded-2xl font-semibold text-lg transition">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </div>
        </div>

        <div id="sitesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6"></div>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker registrado com sucesso!', reg);
                    })
                    .catch(err => {
                        console.error('❌ Falha no registro do Service Worker:', err);
                    });
            });
        }
    </script>
</body>
</html>
