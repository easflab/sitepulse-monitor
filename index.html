<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseMonitor - Monitor de Sites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0f172a] text-white min-h-screen transition-colors">
    <div class="max-w-7xl mx-auto p-4 sm:p-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-10">
            <div class="flex items-center gap-4">
                <i class="fas fa-heartbeat text-emerald-500 text-5xl"></i>
                <div>
                    <h1 class="text-4xl font-bold tracking-tight">PulseMonitor</h1>
                    <p class="text-emerald-400/80 text-sm">Monitoramento em Tempo Real</p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-3">
                <a href="status.html" target="_blank" class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 px-5 py-3 rounded-2xl transition font-medium">
                    <i class="fas fa-chart-bar"></i> Status Page
                </a>
                
                <button onclick="toggleTheme()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-5 py-3 rounded-2xl transition">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                
                <button onclick="reloadAll()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-5 py-3 rounded-2xl transition">
                    <i class="fas fa-sync-alt"></i> Atualizar Tudo
                </button>
                
                <button onclick="clearAllHistory()" class="flex items-center gap-2 bg-orange-600 hover:bg-orange-700 px-5 py-3 rounded-2xl transition">
                    <i class="fas fa-trash"></i> Limpar Histórico
                </button>
                
                <button onclick="exportData()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-5 py-3 rounded-2xl transition">
                    <i class="fas fa-download"></i> Exportar
                </button>
                <button onclick="showAbout()" class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-5 py-3 rounded-2xl transition">
                    <i class="fas fa-info-circle"></i> Sobre
</button>
            </div>
        </header>

        <div class="bg-gray-900/50 border border-white/10 rounded-3xl p-8 mb-10">
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="urlInput" 
                       class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-emerald-500"
                       placeholder="https://exemplo.com">
                <button onclick="addSite()" 
                        class="bg-emerald-600 hover:bg-emerald-700 px-10 rounded-2xl font-semibold text-lg transition whitespace-nowrap">
                    <i class="fas fa-plus"></i> Adicionar Site
                </button>
            </div>
        </div>

        <div id="sitesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
    <script>
    function showAbout() {
        alert(`PulseMonitor - Monitor de Sites

                Desenvolvido por: Elcio Antonio da Silva Filho

                Modelo: Site de monitoramento em tempo real com:
                - Interface responsiva
                - Gráficos interativos
                - Notificações
                - CI/CD com Jenkins e GitHub Actions
                - Deploy automático para GitHub Pages

                Versão: 1.0.0
                Data: Julho 2026`);
    }
</script>
<footer class="mt-16 py-8 border-t border-white/10 text-center text-xs text-gray-500">
    <div class="max-w-7xl mx-auto px-6">
        Projeto PulseMonitor - Versão 1.0.0<br>
        IP de acesso: <span id="visitorIP">Carregando...</span>
    </div>
</footer>

<script>
    // Pegar IP do visitante
    fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('visitorIP').textContent = data.ip;
        })
        .catch(() => {
            document.getElementById('visitorIP').textContent = 'Indisponível';
        });
</script>
</body>
</html>
