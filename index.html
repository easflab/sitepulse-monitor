<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SitePulse - Monitor de Sites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-4">
        <i class="fas fa-pulse text-emerald-500 text-4xl"></i>
        <div>
            <h1 class="text-4xl font-bold">SitePulse</h1>
            <p class="text-gray-400">Monitoramento Profissional</p>
        </div>
    </div>
    
    <div class="flex gap-3">
        <!-- Botão Tema -->
        <button onclick="toggleTheme()" 
                class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-5 py-3 rounded-xl transition" title="Alternar Tema">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        
        <!-- Botão Atualizar Tudo -->
        <button onclick="reloadAll()" 
                class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl transition">
            <i class="fas fa-sync-alt"></i> Atualizar Tudo
        </button>
        
        <!-- Botão Limpar Histórico -->
        <button onclick="clearAllHistory()" 
                class="flex items-center gap-2 bg-orange-600 hover:bg-orange-700 px-5 py-3 rounded-xl transition">
            <i class="fas fa-trash"></i> Limpar Histórico
        </button>
        
        <!-- Botão Exportar -->
        <button onclick="exportData()" 
                class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-5 py-3 rounded-xl transition">
            <i class="fas fa-download"></i> Exportar
        </button>
    </div>
</header>

        <div class="bg-gray-900 rounded-3xl p-8 mb-10">
            <div class="flex gap-4">
                <input type="text" id="urlInput" 
                       class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-6 py-5 text-lg focus:outline-none focus:border-emerald-500"
                       placeholder="https://exemplo.com">
                <button onclick="addSite()" 
                        class="bg-emerald-600 hover:bg-emerald-700 px-10 rounded-2xl font-semibold text-lg transition">
                    <i class="fas fa-plus"></i> Adicionar Site
                </button>
            </div>
        </div>

        <div id="sitesContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
